  Este é o arquivo HTML principal que serve como o esqueleto da aplicação.

-->
<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- Define a codificação de caracteres para suportar acentos e caracteres especiais -->
    <meta charset="UTF-8" />
    
    <!-- Configura a viewport para garantir que o site seja responsivo em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Título da aplicação que aparece na aba do navegador -->
    <title>TaskFlow - Sua Jornada de Produtividade</title>

  <body>

    -->

    <!-- Carrega o ponto de entrada do código TypeScript/React -->
    <script type="module" src="/src/main.tsx"></script>
